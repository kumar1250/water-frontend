<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Water Intake Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,
select{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:white;
    color:#0072ff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#result{
    margin-top:25px;
    text-align:center;
    display:none;
}

.result-card{
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    text-align:left;
}

.result-card h3{
    text-align:center;
}

.result-value{
    font-size:34px;
    font-weight:bold;
    margin:10px 0;
    text-align:center;
}

.glasses{
    text-align:center;
    font-size:15px;
    opacity:0.9;
    margin-bottom:15px;
}

.water-icon{
    font-size:50px;
    display:block;
    text-align:center;
}

.detail-block{
    background:rgba(255,255,255,0.12);
    border-radius:10px;
    padding:12px 14px;
    margin-top:12px;
    font-size:13.5px;
    line-height:1.5;
}

.detail-block strong{
    display:block;
    margin-bottom:4px;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    opacity:0.85;
}

.note{
    margin-top:10px;
    font-size:13px;
    opacity:0.85;
}

.error{
    color:#ffdddd;
    background:rgba(255,0,0,0.2);
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

    <h2>💧 Water Intake Calculator</h2>

    <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter your weight">
    </div>

    <div class="input-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="Enter your age">
    </div>

    <div class="input-group">
        <label>Gender</label>
        <select id="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
    </div>

    <div class="input-group">
        <label>Activity Level</label>
        <select id="activity_level">
            <option value="">Select Activity Level</option>
            <option value="Low">Low</option>
            <option value="Moderate">Moderate</option>
            <option value="High">High</option>
        </select>
    </div>

    <div class="input-group">
        <label>Weather</label>
        <select id="weather">
            <option value="">Select Weather</option>
            <option value="Cold">Cold</option>
            <option value="Normal">Normal</option>
            <option value="Hot">Hot</option>
        </select>
    </div>

    <button onclick="calculateWaterIntake()">
        Calculate 💧
    </button>

    <div id="result"></div>

</div>

<script>

async function calculateWaterIntake(){

    const weight = document.getElementById("weight").value;
    const age = document.getElementById("age").value;
    const gender = document.getElementById("gender").value;
    const activity_level = document.getElementById("activity_level").value;
    const weather = document.getElementById("weather").value;

    const resultBox = document.getElementById("result");

    if(!weight || !age || !gender || !activity_level || !weather){
        resultBox.style.display = "block";
        resultBox.innerHTML = `
            <div class="error">
                Please fill in all fields before calculating.
            </div>
        `;
        return;
    }

    const payload = { gender, weight, age, activity_level, weather };

    try{

        const response = await fetch(
            "https://your-render-app.onrender.com/water/water-intake/",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(payload)
            }
        );

        const data = await response.json();

        resultBox.style.display = "block";

        if(!response.ok){
            resultBox.innerHTML = `
                <div class="error">
                    ${data.error || "Something went wrong. Please check your inputs."}
                </div>
            `;
            return;
        }

        const comparisonNote = data.comparison && data.comparison.note
            ? `<div class="detail-block"><strong>How this compares</strong>${data.comparison.note}</div>`
            : "";

        resultBox.innerHTML = `
            <div class="result-card">
                <span class="water-icon">💧</span>
                <h3>Recommended Intake</h3>
                <div class="result-value">${data.recommended_water_intake} L</div>
                <div class="glasses">≈ ${data.glasses_per_day} glasses (${data.glass_size_ml}ml each) per day</div>
                <div class="detail-block">
                    <strong>Why this number</strong>
                    ${data.explanation}
                </div>
                ${comparisonNote}
            </div>
        `;

    }
    catch(error){

        resultBox.style.display = "block";

        resultBox.innerHTML = `
            <div class="error">
                Failed to connect to server
            </div>
        `;

        console.error(error);
    }
}

</script>

</body>
</html>
