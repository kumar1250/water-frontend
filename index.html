<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Water Intake Calculator</title>
<style>
*{box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0ea5e9,#2563eb)}
.card{background:#ffffffee;width:min(92%,520px);padding:24px;border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.2)}
h2{text-align:center;color:#2563eb}
label{display:block;margin:10px 0 5px;font-weight:600}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px}
button{margin-top:16px;background:#2563eb;color:#fff;border:none;cursor:pointer}
button:hover{background:#1d4ed8}
#loader{display:none;text-align:center;margin:15px}
.spinner{width:42px;height:42px;border:5px solid #ddd;border-top:5px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
#result{display:none;margin-top:20px}
.result{background:#eff6ff;padding:18px;border-radius:12px}
.big{font-size:42px;color:#2563eb;text-align:center;font-weight:bold}
.progress{height:14px;background:#dbeafe;border-radius:20px;overflow:hidden;margin:10px 0}
.bar{height:100%;width:0;background:#2563eb;transition:1s}
.tip{background:#f8fafc;padding:10px;border-left:4px solid #2563eb;margin-top:10px}
.error{background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px}
</style>
</head>
<body>
<div class="card">
<h2>💧 Daily Water Intake Calculator</h2>
<label>Weight (kg)</label><input id="weight" type="number">
<label>Age</label><input id="age" type="number">
<label>Gender</label>
<select id="gender"><option value="">Select</option><option>Male</option><option>Female</option></select>
<label>Activity</label>
<select id="activity_level"><option value="">Select</option><option>Low</option><option>Moderate</option><option>High</option></select>
<label>Weather</label>
<select id="weather"><option value="">Select</option><option>Cold</option><option>Normal</option><option>Hot</option></select>
<button onclick="calculate()">Calculate</button>
<div id="loader"><div class="spinner"></div><p>Calculating...</p></div>
<div id="result"></div>
</div>
<script>
const tips=[
"Drink a glass of water after waking up.",
"Carry a reusable water bottle.",
"Drink more water after exercise.",
"Increase intake during hot weather.",
"Sip water throughout the day."
];
async function calculate(){
const w=weight.value,a=age.value,g=gender.value,ac=activity_level.value,we=weather.value;
const res=document.getElementById('result'),loader=document.getElementById('loader');
if(!w||!a||!g||!ac||!we){res.style.display='block';res.innerHTML='<div class="error">Please fill all fields.</div>';return;}
loader.style.display='block';res.style.display='none';
try{
const r=await fetch("https://water-voxd.onrender.com/water/water-intake/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({weight:w,age:a,gender:g,activity_level:ac,weather:we})
});
const d=await r.json();
loader.style.display='none';
res.style.display='block';
if(!r.ok){res.innerHTML='<div class="error">'+(d.error||'Server error')+'</div>';return;}
const liters=parseFloat(d.recommended_water_intake);
const glasses=Math.round((liters*1000)/250);
const pct=Math.min(100,Math.round((liters/5)*100));
document.querySelector;
res.innerHTML=`<div class="result">
<div class="big">${liters} L</div>
<p style="text-align:center">≈ ${glasses} glasses/day</p>
<div class="progress"><div class="bar" style="width:${pct}%"></div></div>
<p><b>Status:</b> ${liters<2?'Low':liters<3?'Good':'Excellent'}</p>
<div class="tip"><b>Health Tip:</b> ${tips[Math.floor(Math.random()*tips.length)]}</div>
</div>`;
}catch(e){
loader.style.display='none';
res.style.display='block';
res.innerHTML='<div class="error">Failed to connect to server.</div>';
}
}
</script>
</body>
</html>
